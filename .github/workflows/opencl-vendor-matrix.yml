name: OpenCL Vendor Matrix

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  vendor-matrix:
    strategy:
      fail-fast: false
      matrix:
        include:
          - vendor: intel
            runs_on: [self-hosted, windows, opencl, intel]
          - vendor: nvidia
            runs_on: [self-hosted, windows, opencl, nvidia]
          - vendor: amd
            runs_on: [self-hosted, windows, opencl, amd]

    runs-on: ${{ matrix.runs_on }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Vendor validation suite
        run: ./gradlew.bat :processor:openClVendorValidation --console=plain

      - name: Integration smoke
        run: ./gradlew.bat :processor:integrationOpenClSmokeTest --console=plain

      - name: Serious workload validation
        run: ./gradlew.bat :processor:openClWorkloadValidationTest --console=plain

      - name: Long-running stability validation
        run: ./gradlew.bat :processor:openClLongRunningStabilityTest --console=plain

      - name: Benchmark companion
        run: ./gradlew.bat :processor:benchmarkTest --console=plain

      - name: Generate validation report
        if: always()
        run: ./gradlew.bat :processor:openClValidationReport --console=plain
        env:
          JTG_VALIDATION_VENDOR: ${{ matrix.vendor }}

      - name: Upload OpenCL report bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opencl-validation-${{ matrix.vendor }}
          path: processor/build/reports/opencl/
          if-no-files-found: warn
